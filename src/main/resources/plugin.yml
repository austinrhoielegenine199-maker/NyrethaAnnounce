name: NyrethaAnnounce
version: 1.0
author: ArchiveAustin
main: me.nyrethaannounce.NyrethaAnnounce
api-version: '1.21'

commands:
  announce:
    description: Send a title announcement to all players
    usage: /announce <message>
    permission: announce.use

permissions:
  announce.use:
    description: Allows the player to use /announce and /announce reload
    default: op
